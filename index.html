<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espectro de Ideologia Política — Autodeclaração Patidária</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <header class="masthead">
    <div class="masthead-bar">
      <h1>Espectro de Ideologia Política</h1>
      <span class="kicker">Conforme Autodeclaração Partidária</span>
    </div>
  </header>

  <!-- Legenda fixa das 7 categorias -->
  <div class="legenda" id="legenda"></div>

  <!-- Gráfico principal -->
  <div class="grafico-wrap">
    <h2 class="grafico-titulo">
      Posicionamento dos Partidos
      <span class="count" id="contador"></span>
    </h2>
    <div class="chart">
      <div class="chart-eixo" id="eixo"></div>
      <div class="chart-tracks" id="tracks-bg"></div>
      <div class="chart-rows" id="chart-rows"></div>
    </div>

    <div class="indice-partidos" id="indice-partidos"></div>
  </div>

  <!-- Painel de gestão de partidos -->
  <div class="painel-gestao">
    <h2 class="painel-titulo">
      Gerenciar Partidos
      <div class="acoes-json">
        <button type="button" class="btn-mini" id="btn-exportar">Exportar JSON</button>
        <button type="button" class="btn-mini" id="btn-importar">Importar JSON</button>
        <input type="file" id="input-importar-arquivo" accept="application/json,.json" hidden>
      </div>
    </h2>

    <form id="form-partido" class="form-partido">
      <input type="hidden" id="editando-id" value="">

      <div class="campo campo-sigla">
        <label for="input-sigla">Sigla</label>
        <input type="text" id="input-sigla" maxlength="8" placeholder="PSD" required>
      </div>

      <div class="campo campo-nome">
        <label for="input-nome">Nome completo</label>
        <input type="text" id="input-nome" maxlength="80" placeholder="Partido Social Democrata" required>
      </div>

      <div class="campo campo-categorias">
        <label>Posição no espectro <span class="hint">(1 a 3 categorias contíguas)</span></label>
        <div class="checks-categorias" id="checks-categorias"></div>
      </div>

      <div class="campo-acoes">
        <button type="submit" class="btn btn-primario" id="btn-submit">Adicionar Partido</button>
        <button type="button" class="btn btn-secundario" id="btn-cancelar" style="display:none;">Cancelar Edição</button>
      </div>

      <p class="form-erro" id="form-erro"></p>
    </form>

    <div class="lista-gestao" id="lista-gestao"></div>
  </div>

  <footer class="ficha">
    <span>Fonte: declaração própria de cada agremiação partidária</span>
    <span>7 categorias · Extrema-Esquerda → Extrema-Direita</span>
  </footer>

</div>

<script src="script.js"></script>

</body>
</html>
